name: Publish

# Publishes to npmjs (primary, with provenance) and mirrors to GitHub Packages, then announces the
# release to the BaryoDev org discussions. Trigger by publishing a GitHub Release, or manually.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
      packages: write # lets GITHUB_TOKEN publish to GitHub Packages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build

      - name: Publish to npmjs
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Mirror the same build to GitHub Packages.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://npm.pkg.github.com"
          scope: "@baryodev"
      - name: Mirror to GitHub Packages
        run: npm publish --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Announce the release
        if: ${{ secrets.ANNOUNCE_TOKEN != '' }}
        env:
          ANNOUNCE_TOKEN: ${{ secrets.ANNOUNCE_TOKEN }}
          PACKAGE: "@baryodev/pwa-kit"
          VERSION: ${{ github.event.release.tag_name || github.ref_name }}
          NOTES: ${{ github.event.release.body }}
        run: npx --yes tsx scripts/announce-release.ts
