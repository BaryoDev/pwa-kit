name: Publish

# Publishes to npmjs via trusted publishing (OIDC — no NPM_TOKEN, provenance automatic), mirrors to
# GitHub Packages, then announces the release to the BaryoDev org discussions.
# Trigger by publishing a GitHub Release, or manually.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC for npm trusted publishing + provenance
      packages: write # lets GITHUB_TOKEN publish to GitHub Packages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      # Trusted publishing needs npm >= 11.5.1 (newer than what Node 22 bundles).
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build

      - name: Publish to npmjs (trusted publishing)
        run: npm publish --access public

      # Mirror the same build to GitHub Packages.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://npm.pkg.github.com"
          scope: "@baryodev"
      - name: Mirror to GitHub Packages
        run: npm publish --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Announce via the org's reusable workflow (single source of truth for all repos).
  announce:
    needs: publish
    uses: BaryoDev/.github/.github/workflows/announce.yml@main
    with:
      package: "@baryodev/pwa-kit"
      version: ${{ github.event.release.tag_name || github.ref_name }}
      notes: ${{ github.event.release.body }}
      install: "npm i @baryodev/pwa-kit"
    secrets:
      ANNOUNCE_TOKEN: ${{ secrets.ANNOUNCE_TOKEN }}
